name: tests

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Regenerate parquet sample from the committed CSV
        run: python -m src.prepare_data --source data/processed/events_sample.csv --rows 100000
      - name: Run tests
        run: python -m pytest -q -p no:cacheprovider
